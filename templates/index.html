<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis App</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            padding: 50px;
            color: white;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        h1 {
            margin-bottom: 20px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🔥 Sentiment Analysis App</h1>

    <div class="container">
        <form action="/analyze" method="POST">
            <textarea name="text" rows="5" placeholder="Enter your text..."></textarea><br><br>
            <button type="submit">Analyze</button>
        </form>

        {% if result %}
            <div class="result">
                Result: {{ result }} <br><br>
                <small>{{ text }}</small>
            </div>
        {% endif %}
    </div>

</body>
</html>
